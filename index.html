<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Management Board</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <header>
    <h1>Project Management Board</h1>
    <div class="header-actions">
      <label class="upload-btn" for="excel-file">Import Excel</label>
      <input type="file" id="excel-file" accept=".xlsx,.xls,.xlsm" hidden>
      <button id="export-btn" class="export-btn" style="display:none;">Export Excel</button>
    </div>
  </header>

  <!-- Sheet tabs -->
  <div class="sheet-tabs" id="sheet-tabs"></div>

  <!-- Customer filter -->
  <div class="customer-filter" id="customer-filter"></div>

  <main class="board" id="board">
    <div class="empty-state" id="empty-state">
      <div class="upload-prompt">
        <div class="upload-icon">&#128194;</div>
        <p>Import an Excel file to display project progress</p>
        <label class="upload-btn-large" for="excel-file">Choose File</label>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
