<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>專案管理看板</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <header>
    <h1>專案管理看板</h1>
    <div class="header-actions">
      <label class="upload-btn" for="excel-file">匯入 Excel</label>
      <input type="file" id="excel-file" accept=".xlsx,.xls" hidden>
      <button id="export-btn" class="export-btn" style="display:none;">匯出 Excel</button>
    </div>
  </header>

  <!-- Sheet 頁籤 -->
  <div class="sheet-tabs" id="sheet-tabs"></div>

  <!-- 客戶篩選 -->
  <div class="customer-filter" id="customer-filter"></div>

  <main class="board" id="board">
    <div class="empty-state" id="empty-state">
      <div class="upload-prompt">
        <div class="upload-icon">&#128194;</div>
        <p>請匯入 Excel 檔案以顯示專案進度</p>
        <label class="upload-btn-large" for="excel-file">選擇檔案</label>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
