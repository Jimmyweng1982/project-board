<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>專案出包理由產生器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0000;
      color: #ffe0c0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* fire bg gradient animation */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 100%, #ff4500 0%, #b22000 30%, #3a0000 60%, #0a0000 100%);
      animation: fire-bg 3s ease-in-out infinite alternate;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes fire-bg {
      0%   { opacity: 0.6; }
      100% { opacity: 1; }
    }

    /* ember particles */
    .ember {
      position: fixed;
      bottom: 0;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #ffaa00;
      pointer-events: none;
      animation: rise linear infinite;
      z-index: 0;
    }

    @keyframes rise {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 1; }
      70%  { opacity: 0.8; }
      100% { transform: translateY(-100vh) translateX(var(--drift)) scale(0.2); opacity: 0; }
    }

    /* all content above bg */
    body > * { position: relative; z-index: 1; }

    .back-link {
      align-self: flex-start;
      color: #ffaa55;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .back-link:hover { color: #ffdd88; text-decoration: underline; }

    h1 {
      font-size: 32px;
      margin-bottom: 8px;
      text-align: center;
      text-shadow: 0 0 20px #ff4500, 0 0 40px #ff2200;
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0%, 100% { text-shadow: 0 0 20px #ff4500, 0 0 40px #ff2200; }
      50%       { text-shadow: 0 0 30px #ffaa00, 0 0 60px #ff4500; }
    }

    .subtitle {
      color: #cc7744;
      font-size: 14px;
      margin-bottom: 40px;
      text-align: center;
    }

    .machine {
      background: rgba(20, 5, 0, 0.85);
      border: 2px solid #cc3300;
      border-radius: 20px;
      padding: 40px 50px;
      width: 100%;
      max-width: 860px;
      box-shadow: 0 0 40px rgba(255,80,0,0.4), inset 0 0 30px rgba(200,30,0,0.1);
    }

    .reels {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .reel {
      flex: 1;
      background: rgba(10,0,0,0.7);
      border: 2px solid #882200;
      border-radius: 12px;
      padding: 16px;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 0 12px rgba(255,80,0,0.2);
    }

    .reel-label {
      font-size: 11px;
      color: #cc6633;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .reel-value {
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      line-height: 1.4;
      color: #ffcc88;
    }

    .reel:nth-child(1) { border-color: #ff4400; box-shadow: 0 0 16px rgba(255,68,0,0.4); }
    .reel:nth-child(1) .reel-label { color: #ff6633; }
    .reel:nth-child(1) .reel-value { color: #ff9966; }

    .reel:nth-child(2) { border-color: #ff7700; box-shadow: 0 0 16px rgba(255,119,0,0.4); }
    .reel:nth-child(2) .reel-label { color: #ff9922; }
    .reel:nth-child(2) .reel-value { color: #ffbb44; }

    .reel:nth-child(3) { border-color: #ffaa00; box-shadow: 0 0 16px rgba(255,170,0,0.4); }
    .reel:nth-child(3) .reel-label { color: #ffcc33; }
    .reel:nth-child(3) .reel-value { color: #ffee88; }

    .spinning .reel-value {
      animation: blur-spin 0.08s infinite;
    }

    @keyframes blur-spin {
      0%   { opacity: 1; transform: translateY(0); }
      50%  { opacity: 0.3; transform: translateY(-6px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .result-box {
      background: rgba(10,0,0,0.8);
      border: 1px solid #881100;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 28px;
      text-align: center;
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(255,50,0,0.2);
    }

    .result-text {
      font-size: 22px;
      font-weight: 700;
      color: #ff7744;
      line-height: 1.5;
      text-shadow: 0 0 10px rgba(255,80,0,0.6);
    }

    .result-text.empty {
      color: #663322;
      font-size: 15px;
      font-weight: 400;
      text-shadow: none;
    }

    .spin-btn {
      display: block;
      width: 100%;
      padding: 16px;
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #cc2200, #ff6600, #ffaa00);
      background-size: 200% 200%;
      animation: btn-fire 2s ease infinite;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.1s;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      box-shadow: 0 0 20px rgba(255,80,0,0.5);
    }

    @keyframes btn-fire {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .spin-btn:hover { transform: scale(1.01); box-shadow: 0 0 30px rgba(255,100,0,0.7); }
    .spin-btn:active { transform: scale(0.98); }
    .spin-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; animation: none; }

    .history {
      margin-top: 40px;
      width: 100%;
      max-width: 860px;
    }

    .history h2 {
      font-size: 16px;
      color: #aa4422;
      margin-bottom: 12px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      background: rgba(20,5,0,0.8);
      border: 1px solid #551100;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 15px;
      color: #ffcc99;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-item .time {
      color: #884422;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-link">← 返回專案看板</a>

  <h1>🔥 專案出包理由產生器</h1>
  <p class="subtitle">每次按下按鈕，命運就會決定你的專案為什麼失敗</p>

  <div class="machine">
    <div class="reels" id="reels">
      <div class="reel" id="reel-a">
        <div class="reel-label">角色 / 來源</div>
        <div class="reel-value" id="val-a">？</div>
      </div>
      <div class="reel" id="reel-b">
        <div class="reel-label">負面行為</div>
        <div class="reel-value" id="val-b">？</div>
      </div>
      <div class="reel" id="reel-c">
        <div class="reel-label">受影響對象</div>
        <div class="reel-value" id="val-c">？</div>
      </div>
    </div>

    <div class="result-box">
      <div class="result-text empty" id="result">按下按鈕，產生你的專案出包理由</div>
    </div>

    <button class="spin-btn" id="spin-btn" onclick="spin()">🎰 執行</button>
  </div>

  <div class="history" id="history-section" style="display:none;">
    <h2>歷史紀錄</h2>
    <div class="history-list" id="history-list"></div>
  </div>

  <script>
    const A = [
      '關鍵供應商', '終端大客戶', '軟體外包商', '財務審核部',
      '專案贊助人 (Sponsor)', '核心開發工程師', '品質管制部門',
      '競爭對手', '法務與合規部', '政府監管機構',
      '營運維護團隊', '跨部門合作主管', '原物料代理商',
      '資安稽核單位', '設備機台廠商',
      '新上任的 PM', '外部顧問團隊', '會計師事務所',
      '董事會成員', '第三方驗證機構', '海關與港務局',
      '國際物流承包商', '雲端服務供應商', '晶片代工廠',
      '銷售業務團隊', '人資部門', '資深技術顧問',
      '客戶成功團隊', '行銷部門', '離職的前任 PM'
    ];

    const B = [
      '拒絕提供', '頻繁變更', '無預警離職', '惡意調漲',
      '意外凍結', '嚴重漏報', '強制回收', '遲遲未批准',
      '發現致命缺陷', '撤回', '低估', '遺失',
      '宣布停產', '拒絕簽署', '惡意併購',
      '突然要求重做', '誤刪', '擅自修改', '拖延三個月未回覆',
      '在最後一刻否決', '外洩', '重複計算', '無預警停止支援',
      '搞錯版本覆蓋', '偷偷外包給別人', '要求追加但不給預算',
      '在 demo 前一天變更需求', '把 production 當 staging 用',
      '忘記續約導致過期', '用錯誤公式計算'
    ];

    const C = [
      '採購價格', '產品規格 (Spec)', '關鍵設備交期', '年度專案預算',
      '最終上線日期', '測試數據/報告', '技術專利授權', '核心人才資源',
      '合約法律條款', '生產線良率', '系統架構設計', '品牌市場信譽',
      '融資現金流', '關鍵原料供應', '用戶驗收準則 (UAT)',
      '整個資料庫', 'API 金鑰', '客戶個資', '上線環境設定',
      '備份檔案', '里程碑時程表', '驗收文件', '核心演算法',
      '所有測試案例', '伺服器存取權限', '最終報價單',
      '董事會簡報', '跨國合規文件', '緊急備援機制',
      '半年度績效報告'
    ];

    const history = [];

    function rand(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function spin() {
      const btn = document.getElementById('spin-btn');
      btn.disabled = true;

      const reels = document.getElementById('reels');
      reels.classList.add('spinning');

      let ticks = 0;
      const maxTicks = 18;
      const interval = setInterval(() => {
        document.getElementById('val-a').textContent = rand(A);
        document.getElementById('val-b').textContent = rand(B);
        document.getElementById('val-c').textContent = rand(C);
        ticks++;
        if (ticks >= maxTicks) {
          clearInterval(interval);
          reels.classList.remove('spinning');

          const a = rand(A);
          const b = rand(B);
          const c = rand(C);

          document.getElementById('val-a').textContent = a;
          document.getElementById('val-b').textContent = b;
          document.getElementById('val-c').textContent = c;

          const sentence = `${a}${b}了${c}`;
          const resultEl = document.getElementById('result');
          resultEl.textContent = sentence;
          resultEl.classList.remove('empty');

          history.unshift({ text: sentence, time: new Date().toLocaleTimeString() });
          if (history.length > 10) history.pop();
          renderHistory();

          btn.disabled = false;
        }
      }, 80);
    }

    // ember particles
    function spawnEmbers() {
      const count = 18;
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'ember';
        const left = Math.random() * 100;
        const duration = 3 + Math.random() * 5;
        const delay = Math.random() * 6;
        const drift = (Math.random() - 0.5) * 120;
        const size = 2 + Math.random() * 5;
        const colors = ['#ffaa00','#ff6600','#ff3300','#ffdd44','#ffffff'];
        el.style.cssText = `
          left: ${left}vw;
          width: ${size}px;
          height: ${size}px;
          background: ${colors[Math.floor(Math.random()*colors.length)]};
          animation-duration: ${duration}s;
          animation-delay: ${delay}s;
          --drift: ${drift}px;
          box-shadow: 0 0 ${size*2}px ${colors[0]};
        `;
        document.body.appendChild(el);
      }
    }
    spawnEmbers();

    function renderHistory() {
      const section = document.getElementById('history-section');
      const list = document.getElementById('history-list');
      section.style.display = 'block';
      list.innerHTML = history.map(h => `
        <div class="history-item">
          <span>${h.text}</span>
          <span class="time">${h.time}</span>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
