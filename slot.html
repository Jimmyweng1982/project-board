<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>專案失敗產生器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .back-link {
      align-self: flex-start;
      color: #58a6ff;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .back-link:hover { text-decoration: underline; }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      color: #8b949e;
      font-size: 14px;
      margin-bottom: 40px;
      text-align: center;
    }

    .machine {
      background: #161b22;
      border: 2px solid #30363d;
      border-radius: 20px;
      padding: 40px 50px;
      width: 100%;
      max-width: 860px;
      box-shadow: 0 0 40px rgba(88,166,255,0.1);
    }

    .reels {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .reel {
      flex: 1;
      background: #0d1117;
      border: 2px solid #30363d;
      border-radius: 12px;
      padding: 16px;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .reel-label {
      font-size: 11px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .reel-value {
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      line-height: 1.4;
      transition: all 0.1s;
    }

    .reel:nth-child(1) { border-color: #f78166; }
    .reel:nth-child(1) .reel-label { color: #f78166; }
    .reel:nth-child(1) .reel-value { color: #ffa198; }

    .reel:nth-child(2) { border-color: #d29922; }
    .reel:nth-child(2) .reel-label { color: #d29922; }
    .reel:nth-child(2) .reel-value { color: #e3b341; }

    .reel:nth-child(3) { border-color: #3fb950; }
    .reel:nth-child(3) .reel-label { color: #3fb950; }
    .reel:nth-child(3) .reel-value { color: #56d364; }

    .spinning .reel-value {
      animation: blur-spin 0.08s infinite;
    }

    @keyframes blur-spin {
      0%   { opacity: 1; transform: translateY(0); }
      50%  { opacity: 0.3; transform: translateY(-6px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .result-box {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 28px;
      text-align: center;
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-text {
      font-size: 20px;
      font-weight: 700;
      color: #ff6b6b;
      line-height: 1.5;
    }

    .result-text.empty {
      color: #8b949e;
      font-size: 15px;
      font-weight: 400;
    }

    .spin-btn {
      display: block;
      width: 100%;
      padding: 16px;
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #f78166, #d29922);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.1s, opacity 0.2s;
    }

    .spin-btn:hover { opacity: 0.9; transform: scale(1.01); }
    .spin-btn:active { transform: scale(0.98); }
    .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .history {
      margin-top: 40px;
      width: 100%;
      max-width: 860px;
    }

    .history h2 {
      font-size: 16px;
      color: #8b949e;
      margin-bottom: 12px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 15px;
      color: #e6edf3;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-item span {
      color: #8b949e;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-link">← 返回專案看板</a>

  <h1>🎰 專案失敗產生器</h1>
  <p class="subtitle">每次按下按鈕，命運就會決定你的專案為什麼失敗</p>

  <div class="machine">
    <div class="reels" id="reels">
      <div class="reel" id="reel-a">
        <div class="reel-label">角色 / 來源</div>
        <div class="reel-value" id="val-a">？</div>
      </div>
      <div class="reel" id="reel-b">
        <div class="reel-label">負面行為</div>
        <div class="reel-value" id="val-b">？</div>
      </div>
      <div class="reel" id="reel-c">
        <div class="reel-label">受影響對象</div>
        <div class="reel-value" id="val-c">？</div>
      </div>
    </div>

    <div class="result-box">
      <div class="result-text empty" id="result">按下按鈕，產生你的專案失敗理由</div>
    </div>

    <button class="spin-btn" id="spin-btn" onclick="spin()">🎰 執行</button>
  </div>

  <div class="history" id="history-section" style="display:none;">
    <h2>歷史紀錄</h2>
    <div class="history-list" id="history-list"></div>
  </div>

  <script>
    const A = [
      '關鍵供應商', '終端大客戶', '軟體外包商', '財務審核部',
      '專案贊助人 (Sponsor)', '核心開發工程師', '品質管制部門',
      '競爭對手', '法務與合規部', '政府監管機構',
      '營運維護團隊', '跨部門合作主管', '原物料代理商',
      '資安稽核單位', '設備機台廠商'
    ];

    const B = [
      '拒絕提供', '頻繁變更', '無預警離職', '惡意調漲',
      '意外凍結', '嚴重漏報', '強制回收', '遲遲未批准',
      '發現致命缺陷', '撤回', '低估', '遺失',
      '宣布停產', '拒絕簽署', '惡意併購'
    ];

    const C = [
      '採購價格', '產品規格 (Spec)', '關鍵設備交期', '年度專案預算',
      '最終上線日期', '測試數據/報告', '技術專利授權', '核心人才資源',
      '合約法律條款', '生產線良率', '系統架構設計', '品牌市場信譽',
      '融資現金流', '關鍵原料供應', '用戶驗收準則 (UAT)'
    ];

    const history = [];

    function rand(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function spin() {
      const btn = document.getElementById('spin-btn');
      btn.disabled = true;

      const reels = document.getElementById('reels');
      reels.classList.add('spinning');

      let ticks = 0;
      const maxTicks = 18;
      const interval = setInterval(() => {
        document.getElementById('val-a').textContent = rand(A);
        document.getElementById('val-b').textContent = rand(B);
        document.getElementById('val-c').textContent = rand(C);
        ticks++;
        if (ticks >= maxTicks) {
          clearInterval(interval);
          reels.classList.remove('spinning');

          const a = rand(A);
          const b = rand(B);
          const c = rand(C);

          document.getElementById('val-a').textContent = a;
          document.getElementById('val-b').textContent = b;
          document.getElementById('val-c').textContent = c;

          const sentence = `${a}${b}了${c}`;
          const resultEl = document.getElementById('result');
          resultEl.textContent = sentence;
          resultEl.classList.remove('empty');

          // add to history
          history.unshift({ text: sentence, time: new Date().toLocaleTimeString() });
          if (history.length > 10) history.pop();
          renderHistory();

          btn.disabled = false;
        }
      }, 80);
    }

    function renderHistory() {
      const section = document.getElementById('history-section');
      const list = document.getElementById('history-list');
      section.style.display = 'block';
      list.innerHTML = history.map(h => `
        <div class="history-item">
          <span style="color:#e6edf3">${h.text}</span>
          <span>${h.time}</span>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
